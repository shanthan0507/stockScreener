name: Refresh Watchlist

on:
  schedule:
    - cron: "35 13 * * 1-5"   # 9:35 AM ET (UTC-4 summer) = 13:35 UTC
    - cron: "35 20 * * 1-5"   # 4:35 PM ET (UTC-4 summer) = 20:35 UTC
  workflow_dispatch:           # allow manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener pipeline
        run: python -m scripts.build_watchlist

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/watchlist.json data/meta.json
          git diff --cached --quiet || git commit -m "chore: refresh watchlist $(date -u +'%Y-%m-%d %H:%M UTC')"

      - name: Push results
        run: git push
